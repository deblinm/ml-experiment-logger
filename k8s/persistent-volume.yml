apiVersion: v1
kind: PersistentVolume
metadata:
  name: ml-experiment-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/ml-experiment

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-experiment-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi